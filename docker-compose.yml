services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: astro-ankit-app
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - .:/var/www/html
    depends_on:
      db:
        condition: service_healthy

  db:
    image: mysql:8.0
    container_name: astro-ankit-db
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: u614369820_astro_ankit
      MYSQL_USER: u614369820_astro_ankit
      MYSQL_PASSWORD: ">uRC>dXyM3"
      MYSQL_ROOT_PASSWORD: root
    volumes:
      - db_data:/var/lib/mysql
      - ./u614369820_astro_ankit.sql:/docker-entrypoint-initdb.d/u614369820_astro_ankit.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "u614369820_astro_ankit", "-p>uRC>dXyM3"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  db_data:
